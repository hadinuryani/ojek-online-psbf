<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">My Rides</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Riwayat Ride Saya</h2>
                    <a th:href="@{/customer/book-ride}" class="btn btn-warning">
                        <i class="bi bi-plus-circle me-2"></i>Pesan Ride Baru
                    </a>
                </div>

                <div class="row g-4">
                    <div th:each="ride : ${rides}" class="col-md-6 col-xl-4">
                        <div class="card border-0 shadow-sm h-100">
                            <div class="card-header bg-white border-0 pt-3 px-4 d-flex justify-content-between align-items-center">
                                <h6 class="fw-bold mb-0">Ride #<span th:text="${ride.id}"></span></h6>
                                <span class="badge"
                                      th:classappend="${ride.rideStatus?.name == 'COMPLETED'} ? 'bg-success' : (${ride.rideStatus?.name == 'CANCELLED'} ? 'bg-danger' : (${ride.rideStatus?.name == 'ACCEPTED'} ? 'bg-info' : 'bg-warning'))"
                                      th:text="${ride.rideStatus?.name ?: 'N/A'}"></span>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div class="mb-3">
                                    <p class="small text-muted mb-1">Driver</p>
                                    <p class="fw-semibold mb-0" th:text="${ride.driver?.user?.fullName ?: 'Mencari driver...'}"></p>
                                </div>
                                <div class="mb-3 p-2 bg-light rounded">
                                    <p class="small mb-1">
                                        <i class="bi bi-record-circle text-danger me-2"></i>
                                        <span th:text="${ride.route?.pickupLocation?.name ?: '-'}"></span>
                                    </p>
                                    <p class="small mb-0">
                                        <i class="bi bi-geo-alt-fill text-success me-2"></i>
                                        <span th:text="${ride.route?.dropoffLocation?.name ?: '-'}"></span>
                                    </p>
                                </div>
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <div>
                                        <small class="text-muted">Fare</small>
                                        <p class="fw-bold text-success mb-0" th:text="'Rp ' + ${#numbers.formatDecimal(ride.fare, 0, 'COMMA', 0, 'POINT')}"></p>
                                    </div>
                                    <div class="text-end">
                                        <small class="text-muted">Tanggal</small>
                                        <p class="small fw-semibold mb-0" th:text="${ride.createdAt != null ? #temporals.format(ride.createdAt, 'dd MMM yyyy') : '-'}"></p>
                                    </div>
                                </div>

                                <!-- Rate button only for completed rides -->
                                <a th:if="${ride.rideStatus?.name == 'COMPLETED' and !ratedRideIds.contains(ride.id)}"
                                   th:href="@{/customer/my-rides/{id}/rate(id=${ride.id})}"
                                   class="btn btn-outline-warning btn-sm w-100">
                                    <i class="bi bi-star me-2"></i>Beri Rating
                                </a>
                                <div th:if="${ride.rideStatus?.name == 'COMPLETED' and ratedRideIds.contains(ride.id)}" class="text-center">
                                    <small class="text-success fw-semibold">
                                        <i class="bi bi-star-fill text-warning"></i> Sudah Dirating
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(rides)}" class="col-12">
                        <div class="card border-0 shadow-sm text-center py-5">
                            <div class="card-body">
                                <i class="bi bi-geo-alt text-muted" style="font-size: 4rem;"></i>
                                <h5 class="mt-3 text-muted">Kamu belum pernah pesan ride</h5>
                                <a th:href="@{/customer/book-ride}" class="btn btn-warning mt-3">
                                    <i class="bi bi-geo-alt-fill me-2"></i>Pesan Sekarang
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
