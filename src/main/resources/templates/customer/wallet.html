<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">My Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">Wallet Saya</h2>
                    <a th:href="@{/customer/dashboard}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <div class="row g-4">
                    <!-- Wallet Balance Card -->
                    <div class="col-md-5">
                        <div class="card border-0 shadow-sm bg-primary text-white mb-4">
                            <div class="card-body p-4">
                                <p class="small opacity-75 mb-1"><i class="bi bi-wallet2 me-2"></i>Saldo Wallet</p>
                                <h2 class="fw-bold mb-3" th:text="'Rp ' + ${#numbers.formatDecimal(wallet?.balance ?: 0, 0, 'COMMA', 0, 'POINT')}">Rp 0</h2>
                                <p class="small opacity-75 mb-0">Mata uang: <span th:text="${wallet?.currency ?: 'IDR'}">IDR</span></p>
                            </div>
                        </div>

                        <!-- Top Up Form -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 px-4">
                                <h5 class="fw-bold"><i class="bi bi-plus-circle text-success me-2"></i>Top Up Saldo</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div th:if="${wallet == null}" class="alert alert-warning">
                                    <i class="bi bi-exclamation-triangle me-2"></i>Wallet belum tersedia.
                                </div>
                                <form th:unless="${wallet == null}" th:action="@{/customer/wallet/topup}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Jumlah Top Up</label>
                                        <div class="input-group">
                                            <span class="input-group-text">Rp</span>
                                            <input type="number" name="amount" class="form-control" placeholder="50000" min="10000" step="1000" required>
                                        </div>
                                        <div class="form-text">Minimum top up Rp 10.000</div>
                                    </div>

                                    <!-- Quick amount buttons -->
                                    <div class="mb-3">
                                        <label class="form-label small text-muted">Pilih Nominal</label>
                                        <div class="d-flex flex-wrap gap-2">
                                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="setAmount(50000)">Rp 50K</button>
                                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="setAmount(100000)">Rp 100K</button>
                                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="setAmount(200000)">Rp 200K</button>
                                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="setAmount(500000)">Rp 500K</button>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="bi bi-plus-circle me-2"></i>Top Up Sekarang
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Transaction History -->
                    <div class="col-md-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 px-4">
                                <h5 class="fw-bold"><i class="bi bi-clock-history text-primary me-2"></i>Riwayat Transaksi</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div th:if="${wallet != null and !#lists.isEmpty(wallet?.walletTransactions)}">
                                    <div th:each="tx : ${wallet.walletTransactions}" class="d-flex justify-content-between align-items-center py-3 border-bottom">
                                        <div class="d-flex align-items-center">
                                            <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                                                 style="width: 40px; height: 40px;"
                                                 th:classappend="${tx.type == 'TOP_UP'} ? 'bg-success bg-opacity-10' : 'bg-danger bg-opacity-10'">
                                                <i th:classappend="${tx.type == 'TOP_UP'} ? 'bi bi-arrow-down-circle text-success' : 'bi bi-arrow-up-circle text-danger'"
                                                   class="bi"></i>
                                            </div>
                                            <div>
                                                <p class="fw-semibold mb-0 small" th:text="${tx.description ?: tx.type}"></p>
                                                <p class="text-muted mb-0" style="font-size: 0.75rem;" th:text="${tx.createdAt != null ? #temporals.format(tx.createdAt, 'dd MMM yyyy HH:mm') : '-'}"></p>
                                            </div>
                                        </div>
                                        <span class="fw-bold"
                                              th:classappend="${tx.type == 'TOP_UP'} ? 'text-success' : 'text-danger'"
                                              th:text="${tx.type == 'TOP_UP' ? '+' : '-'} + 'Rp ' + ${#numbers.formatDecimal(tx.amount, 0, 'COMMA', 0, 'POINT')}">
                                        </span>
                                    </div>
                                </div>
                                <div th:if="${wallet == null or #lists.isEmpty(wallet?.walletTransactions)}" class="text-center py-4 text-muted">
                                    <i class="bi bi-clock-history fs-2 d-block mb-2"></i>
                                    Belum ada riwayat transaksi
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setAmount(val) {
            document.querySelector('input[name="amount"]').value = val;
        }
    </script>
</body>
</html>
