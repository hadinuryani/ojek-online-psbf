<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">
                <div th:replace="~{fragments/main-content :: alerts}"></div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold" th:text="${pageTitle}">User Management</h2>
                    <a th:href="@{/users/create}" class="btn btn-warning"><i class="bi bi-plus-circle me-2"></i>Add User</a>
                </div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle" id="dataTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>#</th>
                                        <th>Username</th>
                                        <th>Email</th>
                                        <th>Full Name</th>
                                        <th>Phone</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user, stat : ${users}">
                                        <td th:text="${stat.index + 1}">1</td>
                                        <td th:text="${user.username}">admin</td>
                                        <td th:text="${user.email}">admin@mail.com</td>
                                        <td th:text="${user.fullName}">Admin User</td>
                                        <td th:text="${user.phone}">08123</td>
                                        <td>
                                            <span class="badge" th:classappend="${user.isActive} ? 'bg-success' : 'bg-danger'"
                                                  th:text="${user.isActive} ? 'Active' : 'Inactive'">Active</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/users/{id}(id=${user.id})}" class="btn btn-sm btn-info"><i class="bi bi-eye"></i></a>
                                            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-primary"><i class="bi bi-pencil"></i></a>
                                            <a th:href="@{/users/{id}/delete(id=${user.id})}" class="btn btn-sm btn-danger"
                                               onclick="return confirm('Are you sure?')"><i class="bi bi-trash"></i></a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(users)}">
                                        <td colspan="7" class="text-center text-muted py-4">No data found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
