<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Wallet Detail</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Wallet Detail</h2><a th:href="@{/wallets}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="row g-4">
<div class="col-md-4">
<div class="card border-0 shadow-sm text-center">
<div class="card-body p-4">
<i class="bi bi-wallet2 text-warning" style="font-size:3rem;"></i>
<h3 class="fw-bold mt-3 text-success" th:text="'Rp ' + ${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')}">Rp 0</h3>
<p class="text-muted" th:text="${wallet.user?.fullName}">-</p>
<hr>
<form th:action="@{/wallets/{id}/topup(id=${wallet.id})}" method="post" class="d-flex gap-2">
<input type="number" name="amount" class="form-control" placeholder="Amount" required>
<button type="submit" class="btn btn-success"><i class="bi bi-plus-circle"></i> Top Up</button>
</form>
</div></div></div>
<div class="col-md-8">
<div class="card border-0 shadow-sm"><div class="card-header bg-white"><h5 class="mb-0 fw-bold">Transaction History</h5></div>
<div class="card-body"><div class="table-responsive"><table class="table table-sm"><thead><tr><th>Type</th><th>Amount</th><th>Description</th><th>Date</th></tr></thead>
<tbody><tr th:each="t : ${transactions}"><td><span class="badge" th:classappend="${t.type == 'TOP_UP'} ? 'bg-success' : 'bg-danger'" th:text="${t.type}">-</span></td>
<td th:text="'Rp ' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')}">-</td>
<td th:text="${t.description}">-</td><td th:text="${t.createdAt}">-</td></tr>
<tr th:if="${#lists.isEmpty(transactions)}"><td colspan="4" class="text-center text-muted py-3">No transactions</td></tr></tbody></table></div></div></div></div>
</div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
