<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Promo Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Promo Form</h2><a th:href="@{/promos}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="card border-0 shadow-sm"><div class="card-body p-4"><form th:action="@{/promos/save}" th:object="${promo}" method="post"><input type="hidden" th:field="*{id}">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-semibold">Code</label><input type="text" class="form-control" th:field="*{code}" required></div>
<div class="col-md-6"><label class="form-label fw-semibold">Description</label><input type="text" class="form-control" th:field="*{description}"></div>
<div class="col-md-4"><label class="form-label fw-semibold">Discount (%)</label><input type="number" step="0.01" class="form-control" th:field="*{discountPercent}" required></div>
<div class="col-md-4"><label class="form-label fw-semibold">Max Discount</label><input type="number" step="0.01" class="form-control" th:field="*{maxDiscount}" required></div>
<div class="col-md-4"><label class="form-label fw-semibold">Active</label><select class="form-select" th:field="*{isActive}"><option value="true">Yes</option><option value="false">No</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Valid From</label><input type="datetime-local" class="form-control" th:field="*{validFrom}"></div>
<div class="col-md-6"><label class="form-label fw-semibold">Valid Until</label><input type="datetime-local" class="form-control" th:field="*{validUntil}"></div>
<div class="col-12"><hr><button type="submit" class="btn btn-warning px-4"><i class="bi bi-save me-2"></i>Save</button><a th:href="@{/promos}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</div></form></div></div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
