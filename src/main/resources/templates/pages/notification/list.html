<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Notifications</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Notifications</h2><a th:href="@{/notifications/create}" class="btn btn-warning"><i class="bi bi-plus-circle me-2"></i>Add</a></div>
<div class="card border-0 shadow-sm"><div class="card-body"><div class="table-responsive"><table class="table table-hover align-middle"><thead class="table-dark"><tr><th>#</th><th>User</th><th>Title</th><th>Type</th><th>Read</th><th>Date</th><th>Actions</th></tr></thead>
<tbody><tr th:each="n, stat : ${notifications}"><td th:text="${stat.index + 1}">1</td><td th:text="${n.user?.fullName}">-</td><td th:text="${n.title}">-</td><td><span class="badge bg-secondary" th:text="${n.type}">-</span></td>
<td><span class="badge" th:classappend="${n.isRead} ? 'bg-success' : 'bg-warning'" th:text="${n.isRead} ? 'Read' : 'Unread'">Unread</span></td>
<td th:text="${n.createdAt}">-</td>
<td><a th:href="@{/notifications/{id}(id=${n.id})}" class="btn btn-sm btn-info"><i class="bi bi-eye"></i></a>
<a th:if="${!n.isRead}" th:href="@{/notifications/{id}/read(id=${n.id})}" class="btn btn-sm btn-success"><i class="bi bi-check2"></i></a>
<a th:href="@{/notifications/{id}/delete(id=${n.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="bi bi-trash"></i></a></td></tr>
<tr th:if="${#lists.isEmpty(notifications)}"><td colspan="7" class="text-center text-muted py-4">No data</td></tr></tbody></table></div></div></div>
</div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
