<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Booking Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Booking Form</h2><a th:href="@{/bookings}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="card border-0 shadow-sm"><div class="card-body p-4"><form th:action="@{/bookings/save}" th:object="${booking}" method="post"><input type="hidden" th:field="*{id}">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-semibold">Customer</label><select name="customerId" class="form-select" required><option value="">-- Select --</option><option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.user?.fullName}" th:selected="${booking.customer != null && booking.customer.id == c.id}">C</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Ride</label><select name="rideId" class="form-select" required><option value="">-- Select --</option><option th:each="r : ${rides}" th:value="${r.id}" th:text="'Ride #' + ${r.id}" th:selected="${booking.ride != null && booking.ride.id == r.id}">R</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Status</label><select class="form-select" th:field="*{status}"><option value="PENDING">Pending</option><option value="CONFIRMED">Confirmed</option><option value="CANCELLED">Cancelled</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Pickup Address</label><input type="text" class="form-control" th:field="*{pickupAddress}"></div>
<div class="col-md-6"><label class="form-label fw-semibold">Dropoff Address</label><input type="text" class="form-control" th:field="*{dropoffAddress}"></div>
<div class="col-md-6"><label class="form-label fw-semibold">Notes</label><textarea class="form-control" th:field="*{notes}" rows="2"></textarea></div>
<div class="col-12"><hr><button type="submit" class="btn btn-warning px-4"><i class="bi bi-save me-2"></i>Save</button><a th:href="@{/bookings}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</div></form></div></div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
