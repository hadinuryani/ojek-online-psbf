<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">My Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold" th:text="${pageTitle}">My Vehicle</h2>
                    <a th:href="@{/driver/dashboard}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <div class="row g-4">
                    <!-- Existing vehicles -->
                    <div class="col-md-7">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 px-4">
                                <h5 class="fw-bold"><i class="bi bi-truck text-primary me-2"></i>Kendaraan Saya</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <div th:each="vehicle : ${vehicles}" class="card mb-3 border">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between">
                                            <div>
                                                <h6 class="fw-bold mb-1">
                                                    <i class="bi bi-truck me-2"></i>
                                                    <span th:text="${vehicle.brand} + ' ' + ${vehicle.model}">-</span>
                                                </h6>
                                                <p class="text-muted small mb-1">Plat: <strong th:text="${vehicle.plateNumber}"></strong></p>
                                                <p class="text-muted small mb-1">Tahun: <span th:text="${vehicle.year}"></span></p>
                                                <p class="text-muted small mb-1">Warna: <span th:text="${vehicle.color}"></span></p>
                                                <p class="text-muted small mb-0">Tipe: <span th:text="${vehicle.vehicleType?.name ?: '-'}"></span></p>
                                            </div>
                                            <span class="badge h-25" th:classappend="${vehicle.isActive} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${vehicle.isActive} ? 'Aktif' : 'Nonaktif'"></span>
                                        </div>
                                    </div>
                                </div>
                                <div th:if="${#lists.isEmpty(vehicles)}" class="text-center py-4 text-muted">
                                    <i class="bi bi-truck fs-2 d-block mb-2"></i>
                                    Belum ada kendaraan terdaftar
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Add vehicle form -->
                    <div class="col-md-5">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 px-4">
                                <h5 class="fw-bold"><i class="bi bi-plus-circle text-success me-2"></i>Tambah Kendaraan</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <form th:action="@{/driver/my-vehicle/save}" method="post">
                                    <div class="mb-3">
                                        <label class="form-label small fw-semibold">Jenis Kendaraan</label>
                                        <select name="vehicleTypeId" class="form-select" required>
                                            <option value="">-- Pilih Jenis --</option>
                                            <option th:each="vt : ${vehicleTypes}" th:value="${vt.id}" th:text="${vt.name} + ' - ' + ${vt.description}"></option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label small fw-semibold">Nomor Plat</label>
                                        <input type="text" name="plateNumber" class="form-control" placeholder="B 1234 ABC" required>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col">
                                            <label class="form-label small fw-semibold">Merk</label>
                                            <input type="text" name="brand" class="form-control" placeholder="Honda">
                                        </div>
                                        <div class="col">
                                            <label class="form-label small fw-semibold">Model</label>
                                            <input type="text" name="model" class="form-control" placeholder="Vario">
                                        </div>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col">
                                            <label class="form-label small fw-semibold">Tahun</label>
                                            <input type="number" name="year" class="form-control" placeholder="2022" min="2000" max="2030">
                                        </div>
                                        <div class="col">
                                            <label class="form-label small fw-semibold">Warna</label>
                                            <input type="text" name="color" class="form-control" placeholder="Hitam">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="bi bi-plus-circle me-2"></i>Simpan Kendaraan
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
