<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">Notifikasi Saya</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold"><i class="bi bi-bell me-2"></i>Notifikasi Saya</h2>
                    <a th:href="@{/driver/dashboard}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-5">
                            <i class="bi bi-bell-slash text-muted" style="font-size: 3rem;"></i>
                            <h5 class="mt-3 text-muted">Tidak ada notifikasi</h5>
                        </div>

                        <div th:each="notif : ${notifications}"
                             class="d-flex align-items-start p-4 border-bottom"
                             th:classappend="${!notif.isRead} ? 'bg-primary bg-opacity-5' : ''">
                            <div class="rounded-circle d-flex align-items-center justify-content-center me-3 flex-shrink-0"
                                 style="width: 45px; height: 45px;"
                                 th:classappend="${notif.type == 'APPROVAL'} ? 'bg-success bg-opacity-15' : (${notif.type == 'REJECTION'} ? 'bg-danger bg-opacity-15' : 'bg-info bg-opacity-15')">
                                <i class="bi fs-5"
                                   th:classappend="${notif.type == 'APPROVAL'} ? 'bi-check-circle-fill text-success' : (${notif.type == 'REJECTION'} ? 'bi-x-circle-fill text-danger' : 'bi-info-circle-fill text-info')"></i>
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="fw-bold mb-1" th:text="${notif.title}">-</h6>
                                        <p class="text-muted small mb-1" th:text="${notif.message}">-</p>
                                        <small class="text-muted" th:text="${notif.createdAt != null ? #temporals.format(notif.createdAt, 'dd MMM yyyy HH:mm') : '-'}"></small>
                                    </div>
                                    <div class="d-flex gap-2 ms-3 flex-shrink-0">
                                        <span th:if="${!notif.isRead}" class="badge bg-primary rounded-pill">Baru</span>
                                        <a th:if="${!notif.isRead}"
                                           th:href="@{/driver/notifications/{id}/read(id=${notif.id})}"
                                           class="btn btn-outline-primary btn-sm">
                                            <i class="bi bi-check2"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
