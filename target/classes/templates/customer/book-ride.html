<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - OjekOnline'">Book a Ride</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="d-flex">
        <div th:replace="~{fragments/left-menu :: left-menu}"></div>
        <main class="main-content flex-grow-1">
            <div class="container-fluid p-4">

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold" th:text="${pageTitle}">Pesan Ride</h2>
                    <a th:href="@{/customer/dashboard}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <div class="row g-4 justify-content-center">
                    <div class="col-md-8">
                        <div class="card border-0 shadow-sm">
                            <div class="card-header bg-white border-0 pt-4 px-4">
                                <h5 class="fw-bold"><i class="bi bi-geo-alt-fill text-warning me-2"></i>Detail Pesanan</h5>
                            </div>
                            <div class="card-body px-4 pb-4">
                                <form th:action="@{/customer/book-ride}" method="post">

                                    <div class="row g-3 mb-4">
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">
                                                <i class="bi bi-record-circle text-danger me-2"></i>Lokasi Jemput
                                            </label>
                                            <select name="pickupLocationId" id="pickupLocationId" class="form-select" required>
                                                <option value="">-- Pilih Lokasi Jemput --</option>
                                                <option th:each="loc : ${locations}" th:value="${loc.id}"
                                                        th:text="${loc.name} + ' - ' + ${loc.city}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">
                                                <i class="bi bi-geo-alt-fill text-success me-2"></i>Lokasi Tujuan
                                            </label>
                                            <select name="dropoffLocationId" id="dropoffLocationId" class="form-select" required>
                                                <option value="">-- Pilih Lokasi Tujuan --</option>
                                                <option th:each="loc : ${locations}" th:value="${loc.id}"
                                                        th:text="${loc.name} + ' - ' + ${loc.city}"></option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row g-3 mb-4">
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">
                                                <i class="bi bi-truck me-2"></i>Jenis Kendaraan
                                            </label>
                                            <select name="vehicleTypeId" id="vehicleTypeId" class="form-select" required>
                                                <option value="">-- Pilih Jenis --</option>
                                                <option th:each="vt : ${vehicleTypes}" th:value="${vt.id}"
                                                        th:text="${vt.name} + ' (Rp' + ${#numbers.formatDecimal(vt.basePrice, 0, 'COMMA', 0, 'POINT')} + ' + Rp' + ${#numbers.formatDecimal(vt.pricePerKm, 0, 'COMMA', 0, 'POINT')} + '/km)'"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">
                                                <i class="bi bi-credit-card me-2"></i>Metode Pembayaran
                                            </label>
                                            <select name="paymentMethodId" id="paymentMethodId" class="form-select" required>
                                                <option value="">-- Pilih Metode --</option>
                                                <option th:each="pm : ${paymentMethods}" th:value="${pm.id}"
                                                        th:text="${pm.name} + ' - ' + ${pm.description}"></option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            <i class="bi bi-person-badge me-2"></i>Pilih Driver
                                        </label>
                                        <div th:if="${#lists.isEmpty(availableDrivers)}" class="alert alert-warning">
                                            <i class="bi bi-exclamation-triangle me-2"></i>
                                            Tidak ada driver yang tersedia saat ini. Coba lagi nanti.
                                        </div>
                                        <div class="row g-3" th:unless="${#lists.isEmpty(availableDrivers)}">
                                            <div th:each="driver : ${availableDrivers}" class="col-md-6">
                                                <div class="card border h-100" style="cursor:pointer;">
                                                    <div class="card-body p-3">
                                                        <div class="form-check">
                                                            <input class="form-check-input" type="radio" name="driverId"
                                                                   th:id="'driver_' + ${driver.id}"
                                                                   th:value="${driver.id}" required>
                                                            <label class="form-check-label w-100" th:for="'driver_' + ${driver.id}">
                                                                <div class="d-flex align-items-center">
                                                                    <i class="bi bi-person-circle fs-3 text-secondary me-3"></i>
                                                                    <div>
                                                                        <p class="mb-0 fw-semibold small" th:text="${driver.user?.fullName ?: '-'}"></p>
                                                                        <p class="mb-0 text-muted" style="font-size:0.75rem;">
                                                                            <i class="bi bi-star-fill text-warning me-1"></i>
                                                                            <span th:text="${driver.rating}">0.0</span>
                                                                            &bull; <span th:text="${driver.totalTrips}">0</span> trips
                                                                        </p>
                                                                    </div>
                                                                </div>
                                                            </label>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label fw-semibold">
                                            <i class="bi bi-chat-dots me-2"></i>Catatan (opsional)
                                        </label>
                                        <textarea name="notes" class="form-control" rows="2" placeholder="Pakai helm, bawa tas, dll..."></textarea>
                                    </div>

                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-warning btn-lg" th:disabled="${#lists.isEmpty(availableDrivers)}">
                                            <i class="bi bi-geo-alt-fill me-2"></i>Pesan Sekarang
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
