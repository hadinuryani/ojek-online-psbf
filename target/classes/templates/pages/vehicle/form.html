<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Vehicle Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Vehicle Form</h2><a th:href="@{/vehicles}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="card border-0 shadow-sm"><div class="card-body p-4"><form th:action="@{/vehicles/save}" th:object="${vehicle}" method="post"><input type="hidden" th:field="*{id}">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-semibold">Driver</label><select name="driverId" class="form-select" required><option value="">-- Select --</option><option th:each="d : ${drivers}" th:value="${d.id}" th:text="${d.user?.fullName}" th:selected="${vehicle.driver != null && vehicle.driver.id == d.id}">D</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Type</label><select name="vehicleTypeId" class="form-select" required><option value="">-- Select --</option><option th:each="vt : ${vehicleTypes}" th:value="${vt.id}" th:text="${vt.name}" th:selected="${vehicle.vehicleType != null && vehicle.vehicleType.id == vt.id}">T</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Plate Number</label><input type="text" class="form-control" th:field="*{plateNumber}" required></div>
<div class="col-md-6"><label class="form-label fw-semibold">Brand</label><input type="text" class="form-control" th:field="*{brand}"></div>
<div class="col-md-4"><label class="form-label fw-semibold">Model</label><input type="text" class="form-control" th:field="*{model}"></div>
<div class="col-md-4"><label class="form-label fw-semibold">Year</label><input type="number" class="form-control" th:field="*{year}"></div>
<div class="col-md-4"><label class="form-label fw-semibold">Color</label><input type="text" class="form-control" th:field="*{color}"></div>
<div class="col-12"><hr><button type="submit" class="btn btn-warning px-4"><i class="bi bi-save me-2"></i>Save</button><a th:href="@{/vehicles}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</div></form></div></div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
