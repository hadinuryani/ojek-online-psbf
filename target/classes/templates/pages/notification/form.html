<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Notification Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Notification Form</h2><a th:href="@{/notifications}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="card border-0 shadow-sm"><div class="card-body p-4"><form th:action="@{/notifications/save}" th:object="${notification}" method="post"><input type="hidden" th:field="*{id}">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-semibold">User</label><select name="userId" class="form-select" required><option value="">-- Select --</option><option th:each="u : ${users}" th:value="${u.id}" th:text="${u.fullName + ' (' + u.username + ')'}">U</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Type</label><select class="form-select" th:field="*{type}"><option value="INFO">Info</option><option value="WARNING">Warning</option><option value="PROMO">Promo</option><option value="RIDE">Ride</option></select></div>
<div class="col-12"><label class="form-label fw-semibold">Title</label><input type="text" class="form-control" th:field="*{title}" required></div>
<div class="col-12"><label class="form-label fw-semibold">Message</label><textarea class="form-control" th:field="*{message}" rows="3"></textarea></div>
<div class="col-12"><hr><button type="submit" class="btn btn-warning px-4"><i class="bi bi-save me-2"></i>Save</button><a th:href="@{/notifications}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</div></form></div></div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
