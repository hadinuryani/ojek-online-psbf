<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title th:text="${pageTitle} + ' - OjekOnline'">Ride Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"><link th:href="@{/css/style.css}" rel="stylesheet"></head>
<body class="admin-body"><div th:replace="~{fragments/header :: header}"></div><div class="d-flex"><div th:replace="~{fragments/left-menu :: left-menu}"></div>
<main class="main-content flex-grow-1"><div class="container-fluid p-4"><div th:replace="~{fragments/main-content :: alerts}"></div>
<div class="d-flex justify-content-between align-items-center mb-4"><h2 class="fw-bold" th:text="${pageTitle}">Ride Form</h2><a th:href="@{/rides}" class="btn btn-secondary"><i class="bi bi-arrow-left me-2"></i>Back</a></div>
<div class="card border-0 shadow-sm"><div class="card-body p-4"><form th:action="@{/rides/save}" th:object="${ride}" method="post"><input type="hidden" th:field="*{id}">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-semibold">Customer</label><select name="customerId" class="form-select" required><option value="">-- Select --</option><option th:each="c : ${customers}" th:value="${c.id}" th:text="${c.user?.fullName}" th:selected="${ride.customer != null && ride.customer.id == c.id}">Customer</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Driver</label><select name="driverId" class="form-select"><option value="">-- Unassigned --</option><option th:each="d : ${drivers}" th:value="${d.id}" th:text="${d.user?.fullName}" th:selected="${ride.driver != null && ride.driver.id == d.id}">Driver</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Route</label><select name="routeId" class="form-select" required><option value="">-- Select --</option><option th:each="r : ${routes}" th:value="${r.id}" th:text="${r.pickupLocation?.name + ' → ' + r.dropoffLocation?.name + ' (' + r.distance + ' km)'}" th:selected="${ride.route != null && ride.route.id == r.id}">Route</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Status</label><select name="rideStatusId" class="form-select" required><option value="">-- Select --</option><option th:each="s : ${rideStatuses}" th:value="${s.id}" th:text="${s.name}" th:selected="${ride.rideStatus != null && ride.rideStatus.id == s.id}">Status</option></select></div>
<div class="col-md-6"><label class="form-label fw-semibold">Fare (Rp)</label><input type="number" step="0.01" class="form-control" th:field="*{fare}" required></div>
<div class="col-md-6"><label class="form-label fw-semibold">Notes</label><input type="text" class="form-control" th:field="*{notes}"></div>
<div class="col-12"><hr><button type="submit" class="btn btn-warning px-4"><i class="bi bi-save me-2"></i>Save</button><a th:href="@{/rides}" class="btn btn-outline-secondary ms-2">Cancel</a></div>
</div></form></div></div></div><div th:replace="~{fragments/footer :: footer}"></div></main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
